<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Library</title>

  <style>
    body {
      background-color: #f8f8f8;
      font-family: Arial;
    }

    .book-library {
      background-color: #ffffff;
      width: 80%;
      margin: auto;
      padding: 20px;
      box-shadow: 0 0 10px gray;
    }

    h1 {
      text-align: center;
    }

    .book {
      margin-bottom: 30px;
    }

    .book img {
      display: block;
      margin: auto;
      height: 250px;
    }

    h2 {
      margin: 10px 0 5px;
    }

    p {
      color: #777777;
      margin-bottom: 10px;
    }

    .price {
      background-color: #2ecc71;
      color: white;
      text-align: center;
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

  <div class="book-library">
    <h1>Book Library</h1>

    <div class="book">
      <img src="https://www.bookgeeks.in/wp-content/uploads/2018/01/Spy-in-the-Amber-by-Manohar-Malgonkar.jpg">
      <h2>SPY IN THE AMBER</h2>
      <p>By Manohar Malgonkar</p>
      <div class="price">Rs. 299</div>
    </div>

    <div class="book">
      <img src="https://www.bookgeeks.in/wp-content/uploads/2018/01/Sacred-Games-by-Vikram-Chandra.jpg">
      <h2>Sacred Games</h2>
      <p>By Vikram Chandra</p>
      <div class="price">Rs. 199</div>
    </div>

    <div class="book">
      <img src="https://www.bookgeeks.in/wp-content/uploads/2018/01/Byomkesh-Bakshi-by-Sharadindu-Bandyopadhyay.jpg">
      <h2>BYOMKESH BAKSHI</h2>
      <p>By Sharadindu Bandyopadhyay</p>
      <div class="price">Rs. 249</div>
    </div>

  </div>

</body>
</html>
